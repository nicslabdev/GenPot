name: Build and push Docker image to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Move to correct directory
      run: cd honeypot
      
    - name: Build image using Docker Compose
      run: docker compose build
      working-directory: honeypot
    
    - name: List built images
      run: docker images
    
    - name: Tag image with custom Docker Hub name
      run: docker tag honeypot-honeypot antoniolara2000/genpot:latest
    
    - name: Push image to Docker Hub
      run: docker push antoniolara2000/genpot:latest

